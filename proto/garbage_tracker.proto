syntax = "proto3";
package garbage_tracker;

message Coordinate {
  double longitude = 1;
  double latitude = 2;
}

message PathPhoto {
  int32 id = 1;
  string url = 2;
  string created_at = 3;
}

message PathMessage {
  int32 id = 1;
  int32 user_id = 2;
  string user_name = 3;
  string user_avatar_url = 4;
  repeated Coordinate coordinates = 5;
  double distance_meters = 6;
  string description = 7;
  string litter_level = 8;
  string started_at = 9;
  string ended_at = 10;
  repeated PathPhoto photos = 11;
}

message PathList {
  repeated PathMessage paths = 1;
}

enum Amenity {
  AMENITY_UNKNOWN = 0;
  AMENITY_WASTE_BASKET = 1;
}

message Marker {
  int64 id = 1;
  double latitude = 2;
  double longitude = 3;
  Amenity amenity = 4;
}

message MarkerList {
  repeated Marker markers = 1;
}
